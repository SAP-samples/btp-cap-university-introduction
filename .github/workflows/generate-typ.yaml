name: Generate typ exercise
on:
  release:
    types: [released]

jobs:
  generate-typ:
    runs-on: ubuntu-latest
    permissions:
      # Required to request the OIDC JWT Token
      id-token: write
      # Required when GH token is used to authenticate with private repo
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v3
      - uses: typst-community/setup-typst@v4
      - name: Build typ exercise
        run: typst compile --font-path files/fonts/ exercise.typ develop/exercise.pdf --input version=${{ github.event.release.tag_name }}
      - name: Zip repository structure
        run: zip -r cap-university-introduction.zip develop
      - name: Upload release asset
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload ${{ github.event.release.tag_name }} cap-university-introduction.zip
